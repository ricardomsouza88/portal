<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Portal de Ajuda SAJ - Avançado</title>
<style>
body { font-family: Arial; background: #f5f5f5; text-align: center; padding: 30px; }
.topo { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
input, textarea { padding: 10px; width: 300px; }
button { padding: 8px 12px; cursor: pointer; margin: 2px; }
.card { background: #fff; padding: 15px; margin: 10px auto; max-width: 600px; border-radius: 10px; text-align: left; }
#formContainer { display: none; background: #fff; padding: 20px; margin: 20px auto; max-width: 500px; }
.pagination { margin-top: 20px; }
.page-btn { cursor: pointer; padding: 5px 10px; margin: 0 3px; border: 1px solid #ccc; border-radius: 5px; }
.page-btn.active { background: #ddd; }
</style>
</head>
<body>

<h1>🖥️ Inconsistências</h1>

<div class="topo">
  <input type="text" id="busca" placeholder="Buscar...">
  <button onclick="toggleForm()">➕ Adicionar</button>
</div>

<div id="formContainer">
  <h3>Novo Conteúdo</h3>
  <input type="text" id="tituloInput" placeholder="Título"><br>
  <textarea id="descricaoInput" placeholder="Descrição"></textarea><br>
  <input type="text" id="linkInput" placeholder="Link do PDF (OneDrive)"><br><br>
  <button onclick="adicionarConteudo()">Salvar</button>
</div>

<div id="lista"></div>
<div class="pagination" id="pagination"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔴 CONFIGURAÇÃO FIREBASE */
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_DOMINIO.firebaseapp.com",
  projectId: "SEU_PROJECT_ID",
  appId: "SUA_APP_ID"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let dados = [];
const lista = document.getElementById("lista");
const busca = document.getElementById("busca");
const paginationDiv = document.getElementById("pagination");
const itensPorPagina = 5;
let paginaAtual = 1;

/* Mostrar cards com paginação */
function mostrarCards(array = dados) {
  lista.innerHTML = "";
  const inicio = (paginaAtual - 1) * itensPorPagina;
  const fim = inicio + itensPorPagina;
  const paginaItens = array.slice(inicio, fim);

  if(paginaItens.length === 0){
    lista.innerHTML = "<p>Nenhum tópico encontrado.</p>";
    paginationDiv.innerHTML = "";
    return;
  }

  paginaItens.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <h3>${item.titulo}</h3>
      <p>${item.descricao}</p>
      <button onclick="window.open('${item.link}','_blank')">Abrir PDF</button>
      <button onclick="copiarLink('${item.link}')">Copiar Link</button>
      <button onclick="editarConteudo('${item.id}')">Editar</button>
      <button onclick="excluirConteudo('${item.id}')">Excluir</button>
    `;
    lista.appendChild(div);
  });

  /* Paginação */
  const totalPaginas = Math.ceil(array.length / itensPorPagina);
  paginationDiv.innerHTML = "";
  for(let i=1;i<=totalPaginas;i++){
    const btn = document.createElement("span");
    btn.className = "page-btn" + (i===paginaAtual?" active":"");
    btn.innerText = i;
    btn.onclick = ()=> { paginaAtual=i; mostrarCards(array); };
    paginationDiv.appendChild(btn);
  }
}

/* Copiar link para área de transferência */
window.copiarLink = function(link){
  navigator.clipboard.writeText(link).then(()=>alert("Link copiado!"));
}

/* Filtrar busca */
busca.addEventListener("input", ()=>{
  const filtro = busca.value.toLowerCase();
  const filtrados = dados.filter(item=>
    item.titulo.toLowerCase().includes(filtro) ||
    item.descricao.toLowerCase().includes(filtro)
  );
  paginaAtual = 1;
  mostrarCards(filtrados);
});

/* Carregar dados do Firestore */
async function carregarDados(){
  const snapshot = await getDocs(collection(db,"conteudos"));
  dados = [];
  snapshot.forEach(docSnap=>{
    dados.push({...docSnap.data(), id: docSnap.id});
  });
  mostrarCards(dados);
}

/* Adicionar novo conteúdo */
window.adicionarConteudo = async function(){
  const titulo = document.getElementById("tituloInput").value;
  const descricao = document.getElementById("descricaoInput").value;
  const link = document.getElementById("linkInput").value;

  if(!titulo||!descricao||!link){ alert("Preencha todos os campos!"); return; }

  await addDoc(collection(db,"conteudos"), {titulo,descricao,link});
  alert("Salvo com sucesso!");
  location.reload();
}

/* Excluir conteúdo */
window.excluirConteudo = async function(id){
  if(confirm("Deseja realmente excluir este conteúdo?")){
    await deleteDoc(doc(db,"conteudos",id));
    carregarDados();
  }
}

/* Editar conteúdo */
window.editarConteudo = async function(id){
  const item = dados.find(d=>d.id===id);
  if(!item) return;

  const novoTitulo = prompt("Novo título:", item.titulo);
  const novaDescricao = prompt("Nova descrição:", item.descricao);
  const novoLink = prompt("Novo link PDF:", item.link);

  if(novoTitulo && novaDescricao && novoLink){
    await updateDoc(doc(db,"conteudos",id), {titulo:novoTitulo, descricao:novaDescricao, link:novoLink});
    carregarDados();
  }
}

/* Mostrar/ocultar formulário */
window.toggleForm = function(){
  const form = document.getElementById("formContainer");
  form.style.display = form.style.display==="none"?"block":"none";
}

carregarDados();
</script>
</body>
</html>
