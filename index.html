<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portal de Ajuda SAJ</title>
  <style>
    body { font-family: Arial; background: #f5f5f5; text-align: center; padding: 30px; }
    h1 { text-align: center; margin-bottom: 20px; }
    #busca { padding: 10px; width: 500px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #ccc; }
    .card {
      background: #fff;
      padding: 15px;
      margin: 10px auto;
      max-width: 700px;
      cursor: pointer;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      transition: 0.3s;
      text-align: center;
    }
    .card:hover { background: #eaeaea; }
    .pagination { margin-top: 20px; }
    .page-btn {
      cursor: pointer;
      padding: 8px 12px;
      margin: 0 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
      background: #fff;
    }
    .page-btn.active { background: #ddd; }
  </style>
</head>
<body>

<h1>🖥️ Inconsistências</h1>

<input type="text" id="busca" placeholder="🔍 Pesquise um assunto...">

<div id="lista"></div>
<div class="pagination" id="pagination"></div>

<script>
  // =============================
  // Dados (PDF ou URL)
  // =============================
  const dados = [
    { titulo: "Erro ao Carregar o sistema", descricao: "Erro durante o carregamento do sistema.", arquivo: "pdfs/Erro ao carregar o sistema.pdf" },
    { titulo: "Erro parte padrão", descricao: "Campos com valor padrão automático.", arquivo: "pdfs/Erro parte passiva padrão.pdf" },
    { titulo: "Rito não informado", descricao: "O rito não foi definido.", arquivo: "pdfs/Erro rito não informado.pdf" },
    { titulo: "Aviso já respondido", descricao: "Expediente já respondido.", arquivo: "pdfs/Aviso já respondido.pdf" },
    { titulo: "Erro dados truncados", descricao: "Erro de dados binários truncados.", arquivo: "pdfs/Erro dados truncados..pdf" },
    
    // Exemplo com URL
    { titulo: "Abrir site externo", descricao: "Exemplo abrindo um link", url: "https://www.google.com" },

    { titulo: "Chamado Apolo", descricao: "Encaminhamento para time Apolo.", arquivo: "pdfs/Chamado time apolo.pdf" },
    { titulo: "Pendência antecipada", descricao: "Atualização automática de pendência.", arquivo: "pdfs/pendencia antecipada.pdf" },
    { titulo: "PDF Extra 4", descricao: "Exemplo extra", arquivo: "pdfs/extra4.pdf" },
    { titulo: "PDF Extra 5", descricao: "Exemplo extra", arquivo: "pdfs/extra5.pdf" },
    { titulo: "PDF Extra 6", descricao: "Exemplo extra", arquivo: "pdfs/extra6.pdf" }
  ];

  const lista = document.getElementById("lista");
  const inputBusca = document.getElementById("busca");
  const paginationDiv = document.getElementById("pagination");
  const itensPorPagina = 8;
  let paginaAtual = 1;
  let dadosFiltrados = [...dados];

  // =============================
  // Função para abrir PDF ou URL
  // =============================
  function abrirConteudo(item) {
    const destino = item.url || item.arquivo;

    if (destino) {
      window.open(destino, "_blank");
    } else {
      alert("Nenhum conteúdo disponível.");
    }
  }

  function mostrarTopicos() {
    lista.innerHTML = "";
    const inicio = (paginaAtual - 1) * itensPorPagina;
    const fim = inicio + itensPorPagina;
    const paginaItens = dadosFiltrados.slice(inicio, fim);

    paginaItens.forEach(item => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h3>${item.titulo}</h3>
        <p>${item.descricao}</p>
      `;

      div.onclick = () => abrirConteudo(item);

      lista.appendChild(div);
    });

    // Paginação
    const totalPaginas = Math.ceil(dadosFiltrados.length / itensPorPagina);
    paginationDiv.innerHTML = "";

    for(let i = 1; i <= totalPaginas; i++) {
      const btn = document.createElement("span");
      btn.className = "page-btn" + (i === paginaAtual ? " active" : "");
      btn.innerText = i;
      btn.onclick = () => { paginaAtual = i; mostrarTopicos(); };
      paginationDiv.appendChild(btn);
    }

    if(paginaItens.length === 0) {
      lista.innerHTML = "<p>Nenhum tópico encontrado.</p>";
    }
  }

  // Busca em tempo real
  inputBusca.addEventListener("input", (e) => {
    const filtro = e.target.value.toLowerCase();

    dadosFiltrados = dados.filter(item => 
      item.titulo.toLowerCase().includes(filtro) ||
      item.descricao.toLowerCase().includes(filtro)
    );

    paginaAtual = 1;
    mostrarTopicos();
  });

  // Inicializa
  mostrarTopicos();
</script>

</body>
</html>
