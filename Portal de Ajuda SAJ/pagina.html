<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Conteúdo</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; line-height: 1.6; background: #f5f5f5; }
    a { text-decoration: none; color: #333; }
    h1 { color: #222; }
  </style>
</head>
<body>

<a href="index.html">⬅ Voltar</a>
<h1 id="titulo"></h1>
<p id="conteudo"></p>

<script>
  const item = JSON.parse(localStorage.getItem("conteudoAtual"));
  if(item){
    document.getElementById("titulo").innerText = item.titulo;
    document.getElementById("conteudo").innerText = item.conteudo;
  } else {
    document.body.innerHTML = "❌ Conteúdo não encontrado";
  }
</script>

</body>
</html>
